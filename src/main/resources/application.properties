spring.application.name=med-super-app-backend

spring.mongodb.uri=${MONGODB_URI}
spring.data.mongodb.auto-index-creation=true

app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiration-minutes=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:15}
app.jwt.refresh-token-expiration-days=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:7}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

app.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:System Administrator}
